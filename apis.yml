apis:
- aid: reuters:reuters-connect-api
  name: Reuters Connect API
  description: Professional content delivery platform providing access to news, images,
    video, and data from Reuters and partner content sources via REST API, powering
    over 100 customer applications and internal systems. Content is organized into
    channels by category (TXT, PIX, VID, GFX) and items can be retrieved individually
    or searched by keyword.
