aid: reuters
name: Reuters
description: Global news organization providing breaking news, business, financial,
  and multimedia content through wire services, digital platforms, and content APIs
  serving media organizations worldwide. Reuters Connect Web Services provides a professional
  REST API for searching and retrieving editorial content including text, images,
  video, and graphics.
